<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c2530">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CTW Scan">
<title>CTW Barcode Lookup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --steel:#1c2530; --steel-2:#28323f;
    --copper:#c06a3b; --copper-dk:#a2542b;
    --surface:#f5f3f0; --card:#ffffff;
    --line:#ded8d0; --ink:#232a31; --muted:#7d7b76;
    --ok:#2f8f4e; --ok-bg:#eaf6ee; --danger:#c0392b; --danger-bg:#fbeae8;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Sarabun','Noto Sans Thai',-apple-system,'Segoe UI',sans-serif;
    background:var(--surface); color:var(--ink); font-size:16px; line-height:1.4;
    padding-bottom:28px;
  }
  .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace}

  header{
    background:var(--steel); color:#fff;
    padding:13px 16px calc(12px + env(safe-area-inset-top)) 16px;
    display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:20;
  }
  header .mark{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--copper),var(--copper-dk));
    display:grid;place-items:center;font-weight:800;font-size:14px;letter-spacing:.5px;
  }
  header h1{font-size:16px;margin:0;font-weight:700}
  header .sub{font-size:11px;color:#9fb0c0;margin-top:1px}

  main{max-width:560px;margin:0 auto;padding:14px}

  .dbline{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-size:12.5px;color:var(--muted);margin-bottom:10px;
  }
  .dbline b{color:var(--steel)}
  .sync{border:1px solid var(--line);background:var(--card);border-radius:20px;
    padding:5px 12px;font-size:12px;color:var(--steel);cursor:pointer;font-family:inherit}
  .sync:active{background:#eee}

  .stage{position:relative;border-radius:var(--radius);overflow:hidden;background:#0d1116;aspect-ratio:4/3;border:1px solid var(--line)}
  #reader{width:100%;height:100%}
  #reader video{width:100%!important;height:100%!important;object-fit:cover}
  .stage-empty{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:#8592a0;padding:24px}
  .stage-empty svg{opacity:.55;margin-bottom:10px}
  .scan-frame{position:absolute;inset:16% 14%;pointer-events:none;display:none}
  .scanning .scan-frame{display:block}
  .scan-frame .corner{position:absolute;width:26px;height:26px;border:3px solid var(--copper)}
  .corner.tl{top:0;left:0;border-right:0;border-bottom:0;border-radius:8px 0 0 0}
  .corner.tr{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 8px 0 0}
  .corner.bl{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 8px}
  .corner.br{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 8px 0}
  .scan-line{position:absolute;left:6%;right:6%;height:2px;top:0;background:linear-gradient(90deg,transparent,var(--copper),transparent);animation:sweep 2.2s ease-in-out infinite}
  @keyframes sweep{0%{top:4%}50%{top:96%}100%{top:4%}}
  @media (prefers-reduced-motion:reduce){.scan-line{animation:none;top:50%}}

  .btn{border:0;border-radius:11px;font-family:inherit;font-size:15px;font-weight:700;padding:13px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--copper);color:#fff}
  .btn-primary:active{background:var(--copper-dk)}
  .btn-steel{background:var(--steel);color:#fff}
  .btn-block{width:100%;margin-top:12px}
  .row2{display:flex;gap:8px;margin-top:12px}
  .scan-hint{display:none;margin-top:8px;font-size:12.5px;color:var(--muted);text-align:center;line-height:1.5}
  .row2 .btn{flex:1}
  .filePrev{display:none;margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px}
  .filePrev.show{display:block}
  .fp-label{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .fp-label button{border:0;background:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
  #filePreviewImg{max-width:100%;max-height:300px;border-radius:8px;display:block;object-fit:contain}
  #fileReader{display:none}

  .manual{margin-top:12px;display:flex;gap:8px}
  .manual input{flex:1;border:1px solid var(--line);border-radius:11px;padding:13px 14px;font-size:16px;font-family:inherit;background:var(--card)}
  .manual input:focus{outline:2px solid var(--copper);border-color:transparent}
  .manual button{flex:0 0 auto;padding:13px 18px}

  /* result */
  .result{margin-top:14px;display:none}
  .result.show{display:block;animation:pop .25s ease-out}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .card.found{border-left:5px solid var(--ok)}
  .card.miss{border-left:5px solid var(--danger)}
  .card-top{padding:15px 16px 13px}
  .eyebrow{font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.no{background:var(--danger)}
  .pname{font-size:22px;font-weight:800;line-height:1.15;color:var(--steel)}
  .psize{font-size:16px;font-weight:600;margin-top:3px;color:var(--copper-dk)}
  .swatch{display:inline-flex;align-items:center;gap:7px;margin-top:10px;font-size:13.5px;font-weight:600;padding:4px 11px 4px 6px;border-radius:20px;border:1px solid var(--line);background:#faf8f5}
  .swatch i{width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.2);display:inline-block}
  .detail{border-top:1px solid #eee9e2}
  .drow{display:flex;justify-content:space-between;gap:12px;padding:11px 16px;border-bottom:1px solid #f1ede7;font-size:14px}
  .drow:last-child{border-bottom:0}
  .drow .k{color:var(--muted);flex:0 0 auto}
  .drow .v{text-align:right;font-weight:600;word-break:break-word}
  .miss .card-top{background:var(--danger-bg)}
  .miss .pname{color:var(--danger);font-size:18px}
  .miss .miss-code{font-size:15px;margin-top:6px;color:var(--ink)}

  .recent{margin-top:18px}
  .recent h2{font-size:13px;margin:0 0 8px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .ritem{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:7px;display:flex;justify-content:space-between;gap:10px;font-size:13px;cursor:pointer}
  .ritem:active{background:#f4f1ec}
  .ritem .rc{color:var(--muted)}
  .ritem.no .rn{color:var(--danger)}

  details.settings{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:12px}
  details.settings>summary{padding:13px 14px;font-weight:700;font-size:14px;cursor:pointer;list-style:none}
  details.settings>summary::-webkit-details-marker{display:none}
  details.settings>summary::after{content:'▾';float:right;color:var(--muted)}
  details[open].settings>summary::after{content:'▴'}
  .settings-body{padding:0 14px 14px}
  .settings-body label{display:block;font-size:12.5px;color:var(--muted);margin:8px 0 4px}
  .settings-body input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:13px;font-family:inherit}
  .hint{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.55}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--steel);color:#fff;padding:10px 18px;border-radius:30px;font-size:13.5px;opacity:0;transition:.25s;z-index:40;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="mark">CTW</div>
  <div>
    <h1>ค้นหาสายไฟจากบาร์โค้ด</h1>
    <div class="sub">Barcode Lookup · Charoong Thai Wire &amp; Cable</div>
  </div>
</header>

<main>
  <div class="dbline">
    <span>ฐานข้อมูล (Database): <b id="dbCount">0</b> รายการ</span>
    <button class="sync" id="syncBtn">↻ อัปเดตจาก Sheet</button>
  </div>

  <div class="stage" id="stage">
    <div id="reader"></div>
    <div class="stage-empty" id="stageEmpty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5V3M17 5V3M3 9h18"/>
        <path d="M8 13v3M11 13v3M14 13v3M17 13v3" stroke-width="1.2"/>
      </svg>
      <div>กดปุ่ม “เปิดกล้อง” เพื่อสแกน<br><span style="font-size:13px;opacity:.8">Tap to scan a barcode</span></div>
    </div>
    <div class="scan-frame"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span><span class="scan-line"></span></div>
  </div>

  <div class="scan-hint" id="scanHint">เล็งให้แถบบาร์โค้ดอยู่ในกรอบแนวนอน · ถือห่าง ~10–15 ซม. · แสงสว่างพอ</div>

  <div class="row2">
    <button class="btn btn-primary" id="camBtn">เปิดกล้อง (Camera)</button>
    <button class="btn btn-steel" id="fileBtn">🖼️ รูปจากมือถือ</button>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <div class="filePrev" id="filePreview">
    <div class="fp-label"><span>รูปที่เลือก (Selected image)</span><button id="fileClose" title="ปิด">✕</button></div>
    <img id="filePreviewImg" alt="">
    <div id="fileReader"></div>
  </div>

  <div class="manual">
    <input id="manualInput" inputmode="numeric" autocomplete="off" placeholder="พิมพ์บาร์โค้ด หรือใช้เครื่องสแกน แล้ว Enter">
    <button class="btn btn-steel" id="manualBtn">ค้นหา</button>
  </div>

  <div class="result" id="result"></div>

  <div class="recent" id="recentWrap" style="display:none">
    <h2>ค้นหาล่าสุด (Recent)</h2>
    <div id="recentList"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

e":"60227 IEC 01 (THW)","size":"1 x 4 SQ.MM","conductor":"ตัวนำเส้นเดี่ยว (Solid)","code":"C0185011004","colour":"YELLOW","packing":"50 M/COIL"},{"barcode":"8859866402891","name":"60227 IEC 01 (THW)","size":"1 x 6 SQ.MM","conductor":"ตัวนำตีเกลียว (Strand)","code":"C0185014006","colour":"YELLOW","packing":"20 M/COIL"},{"barcode":"8859866402907","name":"60227 IEC 01 (THW)","size":"1 x 6 SQ.MM","conductor":"ตัวนำตีเกลียว (Strand)","code":"C0185014006","colour":"YELLOW","packing":"30 M/COIL"},{"barcode":"8859866402914","name":"60227 IEC 01 (THW)","size":"1 x 6 SQ.MM","conductor":"ตัวนำตีเกลียว (Strand)","code":"C0185014006","colour":"YELLOW","packing":"50 M/COIL"},{"barcode":"8859866402921","name":"VCT","size":"3 x 1.5 SQ.MM.","conductor":"ตัวนำอ่อนตีเกลียว (Flexible)","code":"C01J5036501","colour":"BLACK","packing":"20 M/COIL"},{"barcode":"8859866402938","name":"VCT","size":"3 x 1.5 SQ.MM.","conductor":"ตัวนำอ่อนตีเกลียว (Flexible)","code":"C01J5036501","colour":"BLACK","packing":"30 M/COIL"},{"barcode":"8859866402945","name":"60227 IEC 01 (THW)","size":"1 x 10 SQ.MM","conductor":"ตัวนำตีเกลียว (Strand)","code":"C0185014010","colour":"BLACK","packing":"50 M/COIL"},{"barcode":"8859866402952","name":"60227 IEC 01 (THW)","size":"1 x 10 SQ.MM","conductor":"ตัวนำตีเกลียว (Strand)","code":"C0185014010","colour":"GREEN/YELLOW","packing":"50 M/COIL"},{"barcode":"8859866402969","name":"60227 IEC 01 (THW)","size":"1 x 25 SQ.MM","conductor":"ตัวนำตีเกลียว (Strand)","code":"C0185014025","colour":"BLACK","packing":"50 M/COIL"},{"barcode":"8859866402976","name":"VCT","size":"2 x 1 SQ.MM.","conductor":"ตัวนำอ่อนตีเกลียว (Flexible)","code":"C01J5026001","colour":"BLACK","packing":"20 M/COIL"},{"barcode":"8859866402983","name":"VCT","size":"2 x 1 SQ.MM.","conductor":"ตัวนำอ่อนตีเกลียว (Flexible)","code":"C01J5026001","colour":"BLACK","packing":"30 M/COIL"},{"barcode":"8859866402990","name":"60227 IEC 02 THW(F)","size":"1 x 2.5 SQ.MM","conductor":"ตัวนำอ่อนตีเกลียว (Flexible)","code":"C01I1016502","colour":"SLATE","packing":"100 M/COIL"}];
  // ====== CONFIG: data source is LOCKED here. Only someone who can edit this
  //         file can change it. End users cannot point the app elsewhere. ======
  // Default = this sheet's CSV endpoint (works if the sheet is shared
  //   "Anyone with the link → Viewer"). If live data does not load, either set
  //   that sharing, or replace the line below with a Publish-to-web CSV URL:
  //   "https://docs.google.com/spreadsheets/d/e/.../pub?output=csv"
  var CSV_URL = "https://docs.google.com/spreadsheets/d/1d80cBAuZrnVWp_YeS5Tju32VwcnWb2bomsF8s80QdyQ/gviz/tq?tqx=out:csv";

  var index = {}, recent = [], scanner = null, scanning = false;
  var lastCode = '', lastTime = 0, audioCtx = null;
  var $ = function(id){ return document.getElementById(id); };

  function buildIndex(list){
    index = {};
    list.forEach(function(p){ if(p.barcode) index[String(p.barcode).trim()] = p; });
    $('dbCount').textContent = list.length;
  }

  /* ---------- feedback ---------- */
  function beep(ok){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      var o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.frequency.value = ok?900:300; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(.001,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.25,audioCtx.currentTime+.01);
      g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.14);
      o.start(); o.stop(audioCtx.currentTime+.15);
    }catch(e){}
  }
  function buzz(ms){ if(navigator.vibrate) navigator.vibrate(ms||55); }
  function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},1800); }

  /* ---------- colour swatch ---------- */
  var COLOURS = {'BLACK':'#222','BROWN':'#6b4423','RED':'#c0392b','GREEN':'#2f8f4e',
    'YELLOW':'#f1c40f','WHITE':'#ffffff','LIGHT BLUE':'#6db3e8','BLUE':'#2d6fb5',
    'SLATE':'#6a7b8a','GREEN/YELLOW':'linear-gradient(135deg,#2f8f4e 50%,#f1c40f 50%)'};
  function swatchHtml(colour){
    if(!colour) return '';
    var c = COLOURS[colour.toUpperCase()] || '#bbb';
    var bg = c.indexOf('gradient')>-1 ? 'background:'+c : 'background:'+c;
    return '<span class="swatch"><i style="'+bg+'"></i>'+esc(colour)+'</span>';
  }

  /* ---------- lookup ---------- */
  function normalize(code){ return String(code||'').replace(/[^0-9A-Za-z]/g,'').trim(); }

  function lookup(raw){
    var code = normalize(raw);
    if(!code) return;
    var now=Date.now();
    if(code===lastCode && (now-lastTime)<1200) return;
    lastCode=code; lastTime=now;

    var p = index[code];
    if(p){ beep(true); buzz(55); showFound(code,p); pushRecent(code,p); }
    else { beep(false); buzz([40,40,40]); showMiss(code); pushRecent(code,null); }
  }

  function showFound(code,p){
    var html =
      '<div class="card found"><div class="card-top">'
      + '<div class="eyebrow"><span class="dot ok"></span>พบในระบบ (Found)</div>'
      + '<div class="pname">'+esc(p.name||'-')+'</div>'
      + '<div class="psize">'+esc(p.size||'')+'</div>'
      + swatchHtml(p.colour)
      + '</div><div class="detail">'
      + drow('ตัวนำ (Conductor)', p.conductor)
      + drow('รหัสสินค้า (Product Code)', p.code, true)
      + drow('บรรจุ (Packing)', p.packing)
      + drow('บาร์โค้ด (GTIN)', code, true)
      + '</div></div>';
    var r=$('result'); r.innerHTML=html; r.classList.add('show');
    r.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  function showMiss(code){
    var r=$('result');
    r.innerHTML='<div class="card miss"><div class="card-top">'
      + '<div class="eyebrow"><span class="dot no"></span>ไม่พบในระบบ (Not found)</div>'
      + '<div class="pname">ไม่พบบาร์โค้ดนี้</div>'
      + '<div class="miss-code mono">'+esc(code)+'</div>'
      + '<div style="font-size:12.5px;color:var(--muted);margin-top:8px">ลองอัปเดตฐานข้อมูลจาก Sheet หรือตรวจสอบว่าบาร์โค้ดถูกต้อง</div>'
      + '</div></div>';
    r.classList.add('show');
    r.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  function drow(k,v,mono){ return '<div class="drow"><span class="k">'+k+'</span><span class="v'+(mono?' mono':'')+'">'+esc(v||'-')+'</span></div>'; }

  function pushRecent(code,p){
    recent.unshift({code:code,name:p?p.name+' '+(p.size||''):null});
    if(recent.length>8) recent.pop();
    var w=$('recentWrap'), l=$('recentList');
    w.style.display='block';
    l.innerHTML = recent.map(function(x){
      return '<div class="ritem'+(x.name?'':' no')+'" data-code="'+esc(x.code)+'">'
        + '<span class="rn">'+(x.name?esc(x.name):'ไม่พบ')+'</span>'
        + '<span class="rc mono">'+esc(x.code)+'</span></div>';
    }).join('');
    Array.prototype.forEach.call(l.querySelectorAll('.ritem'),function(el){
      el.addEventListener('click',function(){ lastCode=''; lookup(el.dataset.code); });
    });
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  /* ---------- camera ---------- */
  function startCamera(){
    if(typeof Html5Qrcode==='undefined'){ toast('โหลดไลบรารีไม่ได้ — ต้องมีอินเทอร์เน็ตครั้งแรก'); return; }
    $('stageEmpty').style.display='none'; $('stage').classList.add('scanning');
    var opts={verbose:false};
    if(typeof Html5QrcodeSupportedFormats!=='undefined'){
      var F=Html5QrcodeSupportedFormats;
      opts.formatsToSupport=[F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.CODE_128,F.CODE_39,F.ITF,F.CODABAR,F.QR_CODE];
    }
    opts.experimentalFeatures={useBarCodeDetectorIfSupported:true};
    scanner=new Html5Qrcode('reader',opts);
    // wide, short scan window suits long EAN-13 barcodes
    var cfg={ fps:15, qrbox:function(w,h){
      var bw=Math.max(220,Math.floor(w*0.88));
      var bh=Math.max(130,Math.floor(Math.min(h*0.55, bw*0.48)));
      return {width:bw,height:bh};
    } };
    // higher resolution belongs in videoConstraints (NOT in the camera selector)
    cfg.videoConstraints={facingMode:'environment',width:{ideal:1920},height:{ideal:1080}};
    function begin(config){
      return scanner.start({facingMode:'environment'},config,function(t){lookup(t);},function(){});
    }
    begin(cfg)
    .catch(function(){
      // fallback: some devices reject the resolution hint — retry with plain config
      var plain={ fps:10, qrbox:cfg.qrbox };
      return begin(plain);
    })
    .then(function(){
      scanning=true; $('camBtn').textContent='ปิดกล้อง (Stop)';
      $('camBtn').classList.remove('btn-primary'); $('camBtn').classList.add('btn-steel');
      $('scanHint').style.display='block';
      if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    })
    .catch(function(err){
      $('stage').classList.remove('scanning'); $('stageEmpty').style.display='grid';
      $('stageEmpty').innerHTML='<div style="color:#c0392b;font-size:14px;line-height:1.6">เปิดกล้องไม่ได้<br><span style="color:#8592a0;font-size:12.5px">ต้องเปิดผ่าน HTTPS บนมือถือ และอนุญาตสิทธิ์กล้อง<br>ระหว่างนี้พิมพ์บาร์โค้ด หรือใช้ปุ่ม “รูปจากมือถือ” ได้</span></div>';
      console.warn(err);
    });
  }
  function stopCamera(){
    if(scanner&&scanning){ scanner.stop().then(function(){scanner.clear();}).catch(function(){}); }
    scanning=false; $('stage').classList.remove('scanning'); $('stageEmpty').style.display='grid';
    $('scanHint').style.display='none';
    $('stageEmpty').innerHTML='<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5V3M17 5V3M3 9h18"/><path d="M8 13v3M11 13v3M14 13v3M17 13v3" stroke-width="1.2"/></svg><div>กดปุ่ม “เปิดกล้อง” เพื่อสแกน<br><span style="font-size:13px;opacity:.8">Tap to scan a barcode</span></div>';
    $('camBtn').textContent='เปิดกล้อง (Camera)'; $('camBtn').classList.add('btn-primary'); $('camBtn').classList.remove('btn-steel');
  }

  /* ---------- CSV live sync ---------- */
  function parseCSV(text){
    var rows=[], row=[], cur='', q=false;
    for(var i=0;i<text.length;i++){
      var ch=text[i];
      if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else{ if(ch==='"')q=true; else if(ch===','){row.push(cur);cur='';}
        else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
        else if(ch==='\r'){} else cur+=ch; }
    }
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    return rows;
  }
  function mapHeader(headers){
    var h=headers.map(function(x){return String(x).toLowerCase().trim();});
    function find(preds){ for(var i=0;i<h.length;i++){ if(preds(h[i],i))return i; } return -1; }
    return {
      barcode: find(function(x){return x.indexOf('barcode')>-1||x.indexOf('gtin')>-1;}),
      name:    find(function(x){return x.indexOf('product name')>-1||x==='name';}),
      size:    find(function(x){return x.indexOf('core')>-1||x.indexOf('size')>-1;}),
      conductor:find(function(x){return x.indexOf('conductor')>-1;}),
      code:    find(function(x){return x.indexOf('product code')>-1||(x.indexOf('code')>-1&&x.indexOf('barcode')<0&&x.indexOf('5')<0);}),
      colour:  find(function(x){return x.indexOf('colour')>-1||x.indexOf('color')>-1;}),
      packing: find(function(x){return x.indexOf('packing')>-1||x.indexOf('pack')>-1;})
    };
  }
  function syncFromSheet(){
    var url = (CSV_URL||'').trim();
    if(!url){ return; }                 // no locked source -> stay on embedded data
    toast('กำลังอัปเดต…');
    fetch(url,{cache:'no-store'}).then(function(r){return r.text();}).then(function(txt){
      var rows=parseCSV(txt).filter(function(r){return r.join('').trim()!=='';});
      var hi=-1; for(var i=0;i<rows.length;i++){ if(rows[i].join('|').toLowerCase().indexOf('barcode')>-1){hi=i;break;} }
      if(hi<0){ toast('อ่านหัวตารางไม่เจอ — ตรวจสอบลิงก์'); return; }
      var m=mapHeader(rows[hi]); var out=[];
      for(var r=hi+1;r<rows.length;r++){
        var c=rows[r]; var bc=(m.barcode>-1?c[m.barcode]:'').trim();
        if(!/^\d{6,}$/.test(bc)) continue;
        out.push({barcode:bc,
          name:pick(c,m.name),size:pick(c,m.size),conductor:pick(c,m.conductor),
          code:pick(c,m.code),colour:pick(c,m.colour),packing:pick(c,m.packing)});
      }
      if(!out.length){ toast('ไม่พบข้อมูลในชีต'); return; }
      PRODUCTS=out; buildIndex(PRODUCTS); toast('อัปเดตแล้ว: '+out.length+' รายการ');
    }).catch(function(e){ toast('อัปเดตไม่สำเร็จ — ตรวจสอบว่าเผยแพร่ CSV แล้ว'); console.warn(e); });
  }
  function pick(c,i){ return (i>-1&&c[i]!=null)?String(c[i]).trim():''; }

  /* ---------- wire up ---------- */
  $('camBtn').addEventListener('click',function(){ scanning?stopCamera():startCamera(); });
  $('manualBtn').addEventListener('click',function(){ var v=$('manualInput').value; $('manualInput').value=''; lastCode=''; lookup(v); });
  $('manualInput').addEventListener('keydown',function(ev){ if(ev.key==='Enter'){ ev.preventDefault(); var v=this.value; this.value=''; lastCode=''; lookup(v); } });
  $('syncBtn').addEventListener('click',syncFromSheet);

  // ---- scan from a photo on the phone ----
  $('fileBtn').addEventListener('click',function(){ $('fileInput').click(); });
  $('fileClose').addEventListener('click',function(){
    $('filePreview').classList.remove('show');
    var img=$('filePreviewImg'); if(img._url){ URL.revokeObjectURL(img._url); img._url=''; } img.removeAttribute('src');
    $('fileReader').innerHTML='';
  });
  $('fileInput').addEventListener('change',function(){
    var f = this.files && this.files[0];
    this.value = '';            // allow picking the same file again
    if(f) scanFromImage(f);
  });
  function scanFromImage(file){
    if(typeof Html5Qrcode==='undefined'){ toast('โหลดไลบรารีไม่ได้ — ต้องมีอินเทอร์เน็ตครั้งแรก'); return; }
    if(scanning) stopCamera();          // release camera first
    $('filePreview').classList.add('show');
    // show the picked image ourselves (reliable across devices)
    var img = $('filePreviewImg');
    if(img._url) { URL.revokeObjectURL(img._url); }
    img._url = URL.createObjectURL(file);
    img.src = img._url;
    $('fileReader').innerHTML='';
    toast('กำลังอ่านรูป…');
    var fscan = new Html5Qrcode('fileReader',{verbose:false});
    fscan.scanFile(file, false)         // decode only; we render the preview above
      .then(function(text){ lastCode=''; lookup(text); })
      .catch(function(err){
        beep(false); buzz([40,40,40]);
        toast('ไม่พบบาร์โค้ดในรูป — ลองรูปที่ชัด/ตรง/ครอปเฉพาะบาร์โค้ด');
        console.warn('scanFile:', err);
      })
      .then(function(){ try{ fscan.clear(); }catch(e){} });
  }

  buildIndex(PRODUCTS);
  if(CSV_URL) syncFromSheet();
})();
</script>
